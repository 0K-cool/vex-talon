name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for:
            1. Code correctness and logic errors
            2. Security issues (injection patterns, hardcoded secrets, unsafe regex)
            3. TypeScript/Node.js best practices
            4. Test coverage for new behaviors
            5. Alignment with 0K-Talon's parity contract with PAI

            Use the repository's CLAUDE.md (if present) for style guidance.
            Focus on the diff only. Be concise — flag real issues, not style preferences.

            Use `gh pr comment` with your Bash tool to leave your review.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
